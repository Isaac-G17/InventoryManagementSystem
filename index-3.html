<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Header</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar bg-light px-3 d-flex justify-content-between">

        <!-- Logo -->
        <a class="navbar-brand fw-bold text-primary" href="#">StockFlow Pro</a>

        <!-- Search -->
        <form class="d-flex flex-grow-2 mx-3" role="search">
            <input class="form-control rounded-pill" type="search" placeholder="Search inventory...">
        </form>

        <!-- Icons + Avatar -->
        <div class="d-flex align-items-center gap-3">
            <i class="bi bi-bell fs-5"></i>
            <i class="bi bi-gear fs-5"></i>
            <img src="https://i.pravatar.cc/40" class="rounded-circle" width="35" height="35">
        </div>

    </nav>

</body>

</html>
